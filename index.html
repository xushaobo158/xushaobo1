    <script id="social-app-hard-clean-script">
      (function () {
        var isSocialApp = function () {
          return /^\/projects\/social-app\/?$/.test(window.location.pathname);
        };
        var removeSocialAppImages = function () {
          if (!isSocialApp()) {
            document.documentElement.classList.remove("social-app-hard-clean");
            return;
          }
          document.documentElement.classList.add("social-app-hard-clean");
          document.querySelectorAll("#project-detail img, .project-image-gallery, .project-image-gallery-item").forEach(function (node) {
            node.remove();
          });
        };
        ["pushState", "replaceState"].forEach(function (name) {
          var original = history[name];
          history[name] = function () {
            var result = original.apply(this, arguments);
            setTimeout(removeSocialAppImages, 0);
            return result;
          };
        });
        window.addEventListener("popstate", removeSocialAppImages);
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", removeSocialAppImages, { once: true });
        } else {
          removeSocialAppImages();
        }
        new MutationObserver(removeSocialAppImages).observe(document.documentElement, {
          childList: true,

        });

<script id="social-app-gallery-clean-script">
(() => {
  const isSocialApp = () => window.location.pathname.replace(/\/+$/, "") === "/projects/social-app";
  const clean = () => {
    if (!isSocialApp()) {
      document.documentElement.classList.remove("social-app-gallery-clean");
      return;
    }
    document.documentElement.classList.add("social-app-gallery-clean");
    document.querySelectorAll("#project-detail .project-image-gallery, #project-detail .project-image-gallery-item, #project-detail .case-gallery, #project-detail [class*=gallery]").forEach((node) => node.remove());
  };
  clean();
  new MutationObserver(clean).observe(document.documentElement, { childList: true, subtree: true });
  window.addEventListener("popstate", clean);
  window.addEventListener("hashchange", clean);
})();
</script>

    <script>
      (() => {
        const updateCodexSocialGalleryHardRemoveFinal = () => {
          const path = window.location.pathname.replace(/\/+$/, "");
          document.documentElement.classList.toggle(
            "codex-social-gallery-hard-remove-final",
            path === "/projects/social-app"
          );

        const wrapHistory = (method) => {
          const original = window.history[method];
          if (!original || original.__codexSocialGalleryHardRemoveFinal) return;
          const patched = function codexSocialGalleryHistoryPatchFinal() {
            const result = original.apply(this, arguments);
            queueMicrotask(updateCodexSocialGalleryHardRemoveFinal);
            return result;
          };
          patched.__codexSocialGalleryHardRemoveFinal = true;
          window.history[method] = patched;
        };

        wrapHistory("pushState");
        wrapHistory("replaceState");
        window.addEventListener("popstate", updateCodexSocialGalleryHardRemoveFinal);

    <script>
      (() => {
        const clearSocialProjectImages = () => {
          if (window.location.pathname !== "/projects/social-app") return;

          document
            .querySelectorAll("#project-detail .project-image-gallery")
            .forEach((gallery) => gallery.remove());
        };

        clearSocialProjectImages();
        new MutationObserver(clearSocialProjectImages).observe(document.documentElement, {
          childList: true,
          subtree: true,
        });
        window.addEventListener("popstate", clearSocialProjectImages);
      })();
    </script>
  <!-- codex-social-project-image-removal-guard -->
  <script>
    (() => {
      const SOCIAL_PROJECT_PATH = "/projects/social-app";

      const isSocialProject = () =>
        window.location.pathname.replace(/\/+$/, "") === SOCIAL_PROJECT_PATH;

      const removeSocialProjectImages = () => {
        if (!isSocialProject()) return;

        const detail = document.querySelector("#project-detail");
        if (!detail) return;

        detail
          .querySelectorAll(
            ".project-image-gallery, .social-case-gallery, [class*='project-image-gallery'], [class*='social-case-gallery'], figure, picture, source, video, img"
          )
          .forEach((node) => node.remove());
      };

      const runRemoval = () => {
        requestAnimationFrame(removeSocialProjectImages);
        window.setTimeout(removeSocialProjectImages, 80);
        window.setTimeout(removeSocialProjectImages, 300);
        window.setTimeout(removeSocialProjectImages, 900);
      };

      const patchHistory = (method) => {
        const original = window.history[method];
        if (!original || original.__codexSocialProjectImageRemovalGuard) return;

        const patched = function codexSocialProjectImageRemovalGuard() {
          const result = original.apply(this, arguments);
          runRemoval();
          return result;
        };

        patched.__codexSocialProjectImageRemovalGuard = true;
        window.history[method] = patched;
      };

      patchHistory("pushState");
      patchHistory("replaceState");
      window.addEventListener("popstate", runRemoval);
      window.addEventListener("hashchange", runRemoval);
      window.addEventListener("load", runRemoval);

      const observer = new MutationObserver(runRemoval);
      observer.observe(document.documentElement, { childList: true, subtree: true });

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", runRemoval);
      }

      runRemoval();
    })();
  </script>
