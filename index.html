<!doctype html>
<html lang="zh-CN">
<head>
    <script>
      (() => {
        const path = window.location.pathname.replace(/\/+$/, "");
        if (path === "/projects/social-app") {
          window.location.replace(
            `/projects/social-app/index.html${window.location.search}${window.location.hash}`,
          );
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="寰愬皯鏌?/ Xushaobo, Product and UX Designer portfolio for internet product roles."
    />
    <title>寰愬皯鏌?/ Xushaobo - Product UX Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/social-app-clear.css" />
    <script src="/social-app-clear.js"></script>
    <style>
      html.social-app-gallery-cleanup .project-image-gallery {
        display: none !important;
      }
    </style>
    <script>
      (function () {
        if (window.location.pathname !== "/projects/social-app") {
          return;
        }

        document.documentElement.classList.add("social-app-gallery-cleanup");

        var removeSocialProjectGallery = function () {
          document.querySelectorAll(".project-image-gallery").forEach(function (node) {
            node.remove();
          });
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", removeSocialProjectGallery, { once: true });
        } else {
          removeSocialProjectGallery();
        }

        new MutationObserver(removeSocialProjectGallery).observe(document.documentElement, {
          childList: true,
          subtree: true
        });
      })();
    </script>
      <style id="social-app-hard-clean-style">
      html.social-app-hard-clean #project-detail img,
      html.social-app-hard-clean .project-image-gallery,
      html.social-app-hard-clean .project-image-gallery-item {
        display: none !important;
        visibility: hidden !important;
        width: 0 !important;
        height: 0 !important;
        min-width: 0 !important;
        min-height: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        border: 0 !important;
        overflow: hidden !important;
      }
      html.social-app-hard-clean #project-detail {
        background: #fff !important;
      }
    </style>
    <script id="social-app-hard-clean-script">
      (function () {
        var isSocialApp = function () {
          return /^\/projects\/social-app\/?$/.test(window.location.pathname);
        };
        var removeSocialAppImages = function () {
          if (!isSocialApp()) {
            document.documentElement.classList.remove("social-app-hard-clean");
            return;
          }
          document.documentElement.classList.add("social-app-hard-clean");
          document.querySelectorAll("#project-detail img, .project-image-gallery, .project-image-gallery-item").forEach(function (node) {
            node.remove();
          });
        };
        ["pushState", "replaceState"].forEach(function (name) {
          var original = history[name];
          history[name] = function () {
            var result = original.apply(this, arguments);
            setTimeout(removeSocialAppImages, 0);
            return result;
          };
        });
        window.addEventListener("popstate", removeSocialAppImages);
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", removeSocialAppImages, { once: true });
        } else {
          removeSocialAppImages();
        }
        new MutationObserver(removeSocialAppImages).observe(document.documentElement, {
          childList: true,
          subtree: true
        });
      })();
    </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/route-entry.jsx"></script>
    <script>
      (() => {
        const clearSocialProjectImages = () => {
          if (window.location.pathname !== "/projects/social-app") return;

          document
            .querySelectorAll("#project-detail .project-image-gallery")
            .forEach((gallery) => gallery.remove());
        };

        clearSocialProjectImages();
        new MutationObserver(clearSocialProjectImages).observe(document.documentElement, {
          childList: true,
          subtree: true,
        });
        window.addEventListener("popstate", clearSocialProjectImages);
      })();
    </script>
  </body>
</html>
